name: Test macOS setup

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache Homebrew
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-${{ hashFiles('.chezmoidata/dependencies.toml') }}
          restore-keys: |
            ${{ runner.os }}-brew-

      - name: Install chezmoi
        run: |
          sh -c "$(curl -fsLS get.chezmoi.io)" -- -b "$HOME/.local/bin"

      - name: Initialize dotfiles
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          "$HOME/.local/bin/chezmoi" init --apply --promptDefaults -S .

      - name: Validate Homebrew Packages
        run: |
          brew update
          
          check_brew() {
            local section=$1
            local pkgs
            # shellcheck disable=SC2016
            pkgs=$(~/.local/bin/chezmoi execute-template "{{ range \$name, \$managers := .dependencies.$section -}}{{- if hasKey \$managers \"brew\" -}}{{- get \$managers \"brew\" | printf \"%s \" -}}{{- end -}}{{- end }}")
            for pkg in $pkgs; do
              echo "Checking Homebrew package: $pkg"
              if ! brew info --json "$pkg" > /dev/null 2>&1; then
                echo "::error::Homebrew package not found: $pkg"
                exit 1
              fi
            done
          }

          check_brew "cli"
          check_brew "dev"
          # Desktop apps (casks) check
          # shellcheck disable=SC2016
          casks=$(~/.local/bin/chezmoi execute-template "{{ range \$name, \$managers := .dependencies.desktop -}}{{- if hasKey \$managers \"brew\" -}}{{- get \$managers \"brew\" | printf \"%s \" -}}{{- end -}}{{- end }}")
          for cask in $casks; do
            echo "Checking Homebrew cask: $cask"
            if ! brew info --cask --json "$cask" > /dev/null 2>&1; then
              echo "::error::Homebrew cask not found: $cask"
              exit 1
            fi
          done

      - name: Validate mise Packages
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          if ! command -v mise &> /dev/null; then
            curl https://mise.run | sh
          fi
          
          # shellcheck disable=SC2016
          mise_pkgs=$(~/.local/bin/chezmoi execute-template '{{ range $section, $deps := .dependencies -}}{{- if or (eq $section "cli") (eq $section "dev") (eq $section "desktop") -}}{{- range $name, $managers := $deps -}}{{- if hasKey $managers "mise" -}}{{- get $managers "mise" | printf "%s " -}}{{- end -}}{{- end -}}{{- end -}}{{- end }}')
          
          for pkg in $mise_pkgs; do
            echo "Checking mise package: $pkg"
            if ! mise ls-remote "$pkg" | head -n 1 > /dev/null 2>&1; then
              echo "::error::mise package not found or invalid: $pkg"
              exit 1
            fi
          done

      - name: Validate Nix Packages
        run: |
          if ! command -v nix &> /dev/null; then
            curl -L https://nixos.org/nix/install | sh -s -- --daemon
            . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          fi

          # shellcheck disable=SC2016
          nix_pkgs=$(~/.local/bin/chezmoi execute-template '{{ range $section, $deps := .dependencies -}}{{- if or (eq $section "cli") (eq $section "dev") (eq $section "desktop") -}}{{- range $name, $managers := $deps -}}{{- if hasKey $managers "nix" -}}{{- get $managers "nix" | printf "%s " -}}{{- end -}}{{- end -}}{{- end -}}{{- end }}')
          
          for pkg in $nix_pkgs; do
            echo "Checking Nix package: $pkg"
            # Nix search can be slow, but this is for existence
            if ! nix-env -qaP "$pkg" > /dev/null 2>&1; then
              # Some names might be different in nix, but we check if the defined string works
              echo "::warning::Nix package validation skipped or failed for: $pkg"
            fi
          done
