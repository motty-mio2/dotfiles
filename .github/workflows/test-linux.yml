name: Test Linux setup

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/test-linux.yml'
      - '.chezmoidata/dependencies.toml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/test-linux.yml'
      - '.chezmoidata/dependencies.toml'

jobs:
  test:
    name: Validate (Linux, ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            os: ubuntu-latest
          - arch: arm64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Dotfiles
        uses: ./.github/actions/setup-dotfiles
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Nix
        uses: nixbuild/nix-quick-install-action@v30

      - name: Validate Nix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          nix-channel --add https://nixos.org/channels/nixpkgs-unstable nixpkgs
          nix-channel --update
          # shellcheck disable=SC2016
          nix_pkgs=$(~/.local/bin/chezmoi execute-template '{{ range $section, $deps := .dependencies -}}{{- if or (eq $section "cli") (eq $section "dev") (eq $section "desktop") -}}{{- range $name, $m := $deps -}}{{- if hasKey $m "nix" -}}{{- get $m "nix" | printf "%s " -}}{{- end -}}{{- end -}}{{- end -}}{{- end }}')
          for pkg in $nix_pkgs; do
            if [ -n "$pkg" ]; then
              echo "Checking Nix: $pkg"
              # Check platform compatibility and existence
              # shellcheck disable=SC2016
              CHECK_RESULT=$(nix-instantiate --eval -E "let pkgs = import <nixpkgs> {}; in if (pkgs ? \"$pkg\") then (let pkg = pkgs.\"$pkg\"; in if builtins.elem pkgs.stdenv.hostPlatform.system (pkg.meta.platforms or [ pkgs.stdenv.hostPlatform.system ]) then \"ok\" else \"unsupported\") else \"missing\"" 2>/dev/null | tr -d '"' || echo "error")
              
              if [ "$CHECK_RESULT" = "unsupported" ]; then
                echo "::warning::Package $pkg is not supported on this platform. Skipping."
              elif [ "$CHECK_RESULT" = "missing" ]; then
                echo "::warning::Nix package not found in nixpkgs: $pkg"
              elif [ "$CHECK_RESULT" = "error" ]; then
                echo "::warning::Error checking Nix package: $pkg"
              else
                if ! nix-env -qaP "$pkg" > /dev/null 2>&1; then
                  echo "::warning::Nix package validation failed: $pkg"
                fi
              fi
            fi
          done

