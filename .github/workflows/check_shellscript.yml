on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "**.sh"
      - "**.sh.tmpl"

jobs:
  shellscript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mfinelli/setup-shfmt@v3
      - uses: extractions/setup-just@v2

      - name: Do Check
        run: |
          just shell
