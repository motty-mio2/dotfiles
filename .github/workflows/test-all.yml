name: Validate Dotfiles

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  linux:
    name: Validate (Linux)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Dotfiles
        uses: ./.github/actions/setup-dotfiles
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate mise
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            export PATH="$HOME/scoop/shims:$PATH"
            if ! command -v mise &> /dev/null; then scoop install mise; fi
          else
            export PATH="$HOME/.local/bin:$PATH"
            if ! command -v mise &> /dev/null; then curl https://mise.run | sh; fi
          fi
          # shellcheck disable=SC2016
          mise_pkgs=$(~/.local/bin/chezmoi execute-template '{{ range $section, $deps := .dependencies -}}{{- if or (eq $section "cli") (eq $section "dev") (eq $section "desktop") -}}{{- range $name, $m := $deps -}}{{- if hasKey $m "mise" -}}{{- get $m "mise" | printf "%s " -}}{{- end -}}{{- end -}}{{- end -}}{{- end -}}{{- end }}')
          for pkg in $mise_pkgs; do
            if [ -n "$pkg" ]; then
              echo "Checking mise: $pkg"
              if [[ "$pkg" == github:* ]]; then
                repo=${pkg#github:}
                os_regex="${{ runner.os == 'macOS' && 'darwin|macos|apple' || (runner.os == 'Windows' && 'win|windows|msvc' || 'linux') }}"
                arch_regex="${{ runner.arch == 'ARM64' && 'arm64|aarch64' || 'x86_64|amd64|x64' }}"
                assets=$(gh api "repos/$repo/releases/latest" --jq '.assets[].name' 2>/dev/null || echo "")
                if [ -n "$assets" ] && ! echo "$assets" | grep -Eiq "($os_regex).*($arch_regex)|($arch_regex).*($os_regex)"; then
                  if ! echo "$assets" | grep -Eiq "$os_regex"; then
                    echo "::warning::Package $pkg does not seem to support ${{ runner.os }} ($os_regex). Skipping."
                    continue
                  fi
                fi
              fi
              mise ls-remote "$pkg" | head -n 1 > /dev/null || exit 1
            fi
          done

      - name: Validate Nix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! command -v nix &> /dev/null; then
            curl -L https://nixos.org/nix/install | sh -s -- --daemon
            . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          fi
          # shellcheck disable=SC2016
          nix_pkgs=$(~/.local/bin/chezmoi execute-template '{{ range $section, $deps := .dependencies -}}{{- if or (eq $section "cli") (eq $section "dev") (eq $section "desktop") -}}{{- range $name, $managers := $deps -}}{{- if hasKey $managers "nix" -}}{{- get $managers "nix" | printf "%s " -}}{{- end -}}{{- end -}}{{- end -}}{{- end }}')
          for pkg in $nix_pkgs; do
            echo "Checking Nix: $pkg"
            if ! nix-env -qaP "$pkg" > /dev/null 2>&1; then
              echo "::warning::Nix package validation skipped/failed: $pkg"
            fi
          done

      - name: Validate npm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # shellcheck disable=SC2016
          npm_pkgs=$(~/.local/bin/chezmoi execute-template '{{ .dependencies.npm | join " " }}')
          for pkg in $npm_pkgs; do
            if [ -n "$pkg" ]; then
              echo "Checking npm: $pkg"
              npm view "$pkg" > /dev/null || exit 1
            fi
          done

      - name: Validate pip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # shellcheck disable=SC2016
          pip_pkgs=$(~/.local/bin/chezmoi execute-template '{{ .dependencies.pip | join " " }}')
          for pkg in $pip_pkgs; do
            if [ -n "$pkg" ]; then
              echo "Checking pip: $pkg"
              curl -sSf "https://pypi.org/pypi/$pkg/json" > /dev/null || exit 1
            fi
          done

  macos:
    name: Validate (macOS)
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache Homebrew
        uses: actions/cache@v5
        with:
          path: ~/Library/Caches/Homebrew
          key: ${{ runner.os }}-brew-${{ hashFiles('.chezmoidata/dependencies.toml') }}
          restore-keys: ${{ runner.os }}-brew-

      - name: Setup Dotfiles
        uses: ./.github/actions/setup-dotfiles
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Homebrew
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          brew update
          check_brew() {
            local pkgs
            # shellcheck disable=SC2016
            pkgs=$(~/.local/bin/chezmoi execute-template "{{ range \$name, \$managers := .dependencies.$1 -}}{{- if hasKey \$managers \"brew\" -}}{{- get \$managers \"brew\" | printf \"%s \" -}}{{- end -}}{{- end }}")
            # shellcheck disable=SC2086
            for pkg in $pkgs; do
              if [ -n "$pkg" ]; then
                echo "Checking Brew: $pkg"
                brew info "${2:-}" --json "$pkg" > /dev/null || exit 1
              fi
            done
          }
          check_brew "cli"
          check_brew "dev"
          check_brew "desktop" "--cask"

      - name: Validate Nix
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! command -v nix &> /dev/null; then
            curl -L https://nixos.org/nix/install | sh -s -- --daemon
            . /nix/var/nix/profiles/default/etc/profile.d/nix-daemon.sh
          fi
          # shellcheck disable=SC2016
          nix_pkgs=$(~/.local/bin/chezmoi execute-template '{{ range $section, $deps := .dependencies -}}{{- if or (eq $section "cli") (eq $section "dev") (eq $section "desktop") -}}{{- range $name, $managers := $deps -}}{{- if hasKey $managers "nix" -}}{{- get $managers "nix" | printf "%s " -}}{{- end -}}{{- end -}}{{- end -}}{{- end }}')
          for pkg in $nix_pkgs; do
            echo "Checking Nix: $pkg"
            if ! nix-env -qaP "$pkg" > /dev/null 2>&1; then
              echo "::warning::Nix package validation skipped/failed: $pkg"
            fi
          done

      - name: Validate mise
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            export PATH="$HOME/scoop/shims:$PATH"
            if ! command -v mise &> /dev/null; then scoop install mise; fi
          else
            export PATH="$HOME/.local/bin:$PATH"
            if ! command -v mise &> /dev/null; then curl https://mise.run | sh; fi
          fi
          # shellcheck disable=SC2016
          mise_pkgs=$(~/.local/bin/chezmoi execute-template '{{ range $section, $deps := .dependencies -}}{{- if or (eq $section "cli") (eq $section "dev") (eq $section "desktop") -}}{{- range $name, $m := $deps -}}{{- if hasKey $m "mise" -}}{{- get $m "mise" | printf "%s " -}}{{- end -}}{{- end -}}{{- end -}}{{- end -}}{{- end }}')
          for pkg in $mise_pkgs; do
            if [ -n "$pkg" ]; then
              echo "Checking mise: $pkg"
              if [[ "$pkg" == github:* ]]; then
                repo=${pkg#github:}
                os_regex="${{ runner.os == 'macOS' && 'darwin|macos|apple' || (runner.os == 'Windows' && 'win|windows|msvc' || 'linux') }}"
                arch_regex="${{ runner.arch == 'ARM64' && 'arm64|aarch64' || 'x86_64|amd64|x64' }}"
                assets=$(gh api "repos/$repo/releases/latest" --jq '.assets[].name' 2>/dev/null || echo "")
                if [ -n "$assets" ] && ! echo "$assets" | grep -Eiq "($os_regex).*($arch_regex)|($arch_regex).*($os_regex)"; then
                  if ! echo "$assets" | grep -Eiq "$os_regex"; then
                    echo "::warning::Package $pkg does not seem to support ${{ runner.os }} ($os_regex). Skipping."
                    continue
                  fi
                fi
              fi
              mise ls-remote "$pkg" | head -n 1 > /dev/null || exit 1
            fi
          done

  windows:
    name: Validate (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache Scoop
        uses: actions/cache@v5
        with:
          path: |
            ~\scoop\cache
            ~\scoop\buckets
          key: ${{ runner.os }}-scoop-${{ hashFiles('.chezmoidata/dependencies.toml') }}
          restore-keys: ${{ runner.os }}-scoop-

      - name: Setup Dotfiles
        uses: ./.github/actions/setup-dotfiles
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Scoop
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $Env:PATH="$HOME\scoop\shims;$Env:PATH"
          . "$HOME\Documents\PowerShell\Microsoft.PowerShell_profile.ps1"
          function Test-Scoop-Pkg {
              param($pkgs)
              foreach ($pkg in $pkgs) {
                  if ($pkg) {
                      Write-Host "Checking Scoop package: $pkg"
                      scoop info $pkg | Out-Null
                      if ($LASTEXITCODE -ne 0) {
                          Write-Error "Scoop package not found: $pkg"
                          exit 1
                      }
                  }
              }
          }
          $cli = (chezmoi execute-template '{{ range $name, $managers := .dependencies.cli -}}{{- if hasKey $managers "scoop" -}}{{- get $managers "scoop" | printf "%s " -}}{{- end -}}{{- end }}') -split '\s+' | Where-Object { $_ }
          $dev = (chezmoi execute-template '{{ range $name, $managers := .dependencies.dev -}}{{- if hasKey $managers "scoop" -}}{{- get $managers "scoop" | printf "%s " -}}{{- end -}}{{- end }}') -split '\s+' | Where-Object { $_ }
          $gui = (chezmoi execute-template '{{ range $name, $managers := .dependencies.desktop -}}{{- if hasKey $managers "scoop" -}}{{- get $managers "scoop" | printf "%s " -}}{{- end -}}{{- end }}') -split '\s+' | Where-Object { $_ }
          Test-Scoop-Pkg ($cli + $dev + $gui + @("7zip", "geekuninstaller", "gsudo", "sysinternals"))

      - name: Validate mise
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export PATH="$HOME/scoop/shims:$PATH"
          if ! command -v mise &> /dev/null; then scoop install mise; fi
          # shellcheck disable=SC2016
          mise_pkgs=$(~/.local/bin/chezmoi execute-template '{{ range $section, $deps := .dependencies -}}{{- if or (eq $section "cli") (eq $section "dev") (eq $section "desktop") -}}{{- range $name, $managers := $deps -}}{{- if hasKey $managers "mise" -}}{{- get $managers "mise" | printf "%s " -}}{{- end -}}{{- end -}}{{- end -}}{{- end }}')
          for pkg in $mise_pkgs; do
            if [ -n "$pkg" ]; then
              echo "Checking mise: $pkg"
              mise ls-remote "$pkg" | head -n 1 > /dev/null || exit 1
            fi
          done
