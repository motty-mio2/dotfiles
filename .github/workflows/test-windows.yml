name: Test Windows setup

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/test-windows.yml'
      - '.chezmoidata/dependencies.toml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/test-windows.yml'
      - '.chezmoidata/dependencies.toml'

jobs:
  test:
    name: Validate (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Get Scoop config
        id: scoop-config
        shell: pwsh
        run: |
          # Install chezmoi briefly to get config
          New-Item -ItemType Directory -Force "$HOME\.local\bin"
          Invoke-WebRequest -Uri "https://github.com/twpayne/chezmoi/releases/latest/download/chezmoi-windows-amd64.exe" -OutFile "$HOME\.local\bin\chezmoi.exe"
          $defaults = (& "$HOME\.local\bin\chezmoi.exe" execute-template -S . '{{ .dependencies.scoop.default | join " " }}')
          $externals = (& "$HOME\.local\bin\chezmoi.exe" execute-template -S . '{{ range $n, $u := .dependencies.scoop.external }}{{ $n }} {{ $u }}|{{ end }}')
          echo "defaults=$defaults" >> $env:GITHUB_OUTPUT
          echo "externals=$externals" >> $env:GITHUB_OUTPUT

      - name: Setup Scoop
        uses: MinoruSekine/setup-scoop@v4
        with:
          buckets: ${{ steps.scoop-config.outputs.defaults }}

      - name: Add custom Scoop buckets
        shell: pwsh
        run: |
          $externals = "${{ steps.scoop-config.outputs.externals }}".Split("|") | Where-Object { $_ }
          foreach ($line in $externals) {
            $parts = $line -split ' '
            scoop bucket add $parts[0] $parts[1]
          }

      - name: Setup Dotfiles
        uses: ./.github/actions/setup-dotfiles
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Scoop
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $Env:PATH="$HOME\scoop\shims;$Env:PATH"
          . "$HOME\Documents\PowerShell\Microsoft.PowerShell_profile.ps1"
          function Test-Scoop-Pkg {
              param($pkgs)
              foreach ($pkg in $pkgs) {
                  if ($pkg) {
                      Write-Host "Checking Scoop package: $pkg"
                      scoop info $pkg | Out-Null
                      if ($LASTEXITCODE -ne 0) {
                          Write-Error "Scoop package not found: $pkg"
                          exit 1
                      }
                  }
              }
          }
          $cli = (& "$HOME\.local\bin\chezmoi.exe" execute-template -S . '{{ range $name, $managers := .dependencies.cli -}}{{- if hasKey $managers "scoop" -}}{{- get $managers "scoop" | printf "%s " -}}{{- end -}}{{- end }}') -split '\s+' | Where-Object { $_ }
          $dev = (& "$HOME\.local\bin\chezmoi.exe" execute-template -S . '{{ range $name, $managers := .dependencies.dev -}}{{- if hasKey $managers "scoop" -}}{{- get $managers "scoop" | printf "%s " -}}{{- end -}}{{- end }}') -split '\s+' | Where-Object { $_ }
          $gui = (& "$HOME\.local\bin\chezmoi.exe" execute-template -S . '{{ range $name, $managers := .dependencies.desktop -}}{{- if hasKey $managers "scoop" -}}{{- get $managers "scoop" | printf "%s " -}}{{- end -}}{{- end }}') -split '\s+' | Where-Object { $_ }
          Test-Scoop-Pkg ($cli + $dev + $gui + @("7zip", "geekuninstaller", "gsudo", "sysinternals"))

      - name: Validate mise
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export PATH="$HOME/scoop/shims:$PATH"
          if ! command -v mise &> /dev/null; then scoop install mise; fi
          # shellcheck disable=SC2016,SC2207
          mise_pkgs=($("$HOME/.local/bin/chezmoi" execute-template -S . '{{ range $section, $deps := .dependencies -}}{{- if or (eq $section "cli") (eq $section "dev") (eq $section "desktop") -}}{{- range $name, $m := $deps -}}{{- if hasKey $m "mise" -}}{{- get $m "mise" | printf "%s " -}}{{- end -}}{{- end -}}{{- end -}}{{- end }}'))
          for pkg in "${mise_pkgs[@]}"; do
            if [ -n "$pkg" ]; then
              echo "Checking mise: $pkg"
              mise ls-remote "$pkg" | head -n 1 > /dev/null || exit 1
            fi
          done
