name: Test Windows setup

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Cache Scoop
        id: cache-scoop
        uses: actions/cache@v5
        with:
          path: |
            ~\scoop\cache
            ~\scoop\buckets
          key: ${{ runner.os }}-scoop-${{ hashFiles('.chezmoidata/dependencies.toml') }}
          restore-keys: |
            ${{ runner.os }}-scoop-

      - name: Install chezmoi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          New-Item -ItemType Directory -Force $HOME/.local/bin
          Invoke-WebRequest -Uri "https://github.com/twpayne/chezmoi/releases/latest/download/chezmoi-windows-amd64.exe" -OutFile $HOME/.local/bin/chezmoi.exe

      - name: Initialize dotfiles
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          ."$HOME/.local/bin/chezmoi.exe" init --apply --promptDefaults -S .
          $Env:PATH="$HOME\scoop\shims;$Env:PATH"
          . "$HOME\Documents\PowerShell\Microsoft.PowerShell_profile.ps1"
          Install-Scoop

      - name: Validate Scoop Packages
        run: |
          $Env:PATH="$HOME\scoop\shims;$Env:PATH"
          . "$HOME\Documents\PowerShell\Microsoft.PowerShell_profile.ps1"
          
          function Test-Scoop-Pkg {
              param($pkgs)
              foreach ($pkg in $pkgs) {
                  if ($pkg) {
                      Write-Host "Checking Scoop package: $pkg"
                      scoop info $pkg | Out-Null
                      if ($LASTEXITCODE -ne 0) {
                          Write-Error "Scoop package not found: $pkg"
                          exit 1
                      }
                  }
              }
          }

          $cli_pkgs = (chezmoi execute-template '{{ range $name, $managers := .dependencies.cli -}}{{- if hasKey $managers "scoop" -}}{{- get $managers "scoop" | printf "%s " -}}{{- end -}}{{- end }}') -split '\s+' | Where-Object { $_ }
          $dev_pkgs = (chezmoi execute-template '{{ range $name, $managers := .dependencies.dev -}}{{- if hasKey $managers "scoop" -}}{{- get $managers "scoop" | printf "%s " -}}{{- end -}}{{- end }}') -split '\s+' | Where-Object { $_ }
          $gui_pkgs = (chezmoi execute-template '{{ range $name, $managers := .dependencies.desktop -}}{{- if hasKey $managers "scoop" -}}{{- get $managers "scoop" | printf "%s " -}}{{- end -}}{{- end }}') -split '\s+' | Where-Object { $_ }
          $default_gui = @("7zip", "geekuninstaller", "gsudo", "sysinternals")

          Test-Scoop-Pkg $cli_pkgs
          Test-Scoop-Pkg $dev_pkgs
          Test-Scoop-Pkg ($gui_pkgs + $default_gui)

      - name: Validate mise Packages
        run: |
          $Env:PATH="$HOME\.local\bin;$Env:PATH"
          if (-not (Get-Command mise -ErrorAction SilentlyContinue)) {
              # On Windows, mise is often installed to ~/.local/bin/mise.exe
              irm https://mise.run | iex
              $Env:PATH="$HOME\.local\bin;$Env:PATH"
          }
          
          $mise_pkgs = (chezmoi execute-template '{{ range $section, $deps := .dependencies -}}{{- if or (eq $section "cli") (eq $section "dev") (eq $section "desktop") -}}{{- range $name, $managers := $deps -}}{{- if hasKey $managers "mise" -}}{{- get $managers "mise" | printf "%s " -}}{{- end -}}{{- end -}}{{- end -}}{{- end }}') -split '\s+' | Where-Object { $_ }
          
          foreach ($pkg in $mise_pkgs) {
              if ($pkg) {
                  Write-Host "Checking mise package: $pkg"
                  # mise ls-remote returns 0 if found, even if it's just a tool name
                  & mise ls-remote $pkg | Select-Object -First 1 | Out-Null
                  if ($LASTEXITCODE -ne 0) {
                      Write-Error "mise package not found or invalid: $pkg"
                      exit 1
                  }
              }
          }
