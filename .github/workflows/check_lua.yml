on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "**.lua"

jobs:
  lua:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: JohnnyMorganz/stylua-action@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check .
