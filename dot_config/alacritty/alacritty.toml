[general]
import = ["~/.config/alacritty/os-specified.toml"]


[window]
blur = true
opacity = 0.8

decorations = "none"
[font]
normal.family = "HackGen35 Console NF"

[cursor]
style = { shape = "Beam", blinking = "Off" }

[env]
TERM = "xterm-256color"

[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"
