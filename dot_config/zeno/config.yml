snippets:
  - name: apt update
    keyword: aupdate
    snippet: sudo apt update && sudo apt upgrade -y && sudo apt autoremove -y

  - name: brew update
    keyword: bupdate
    snippet: brew update && brew upgrade && brew cleanup

  - name: dnf update
    keyword: dupdate
    snippet: sudo dnf update -y

  - name: flatpak update
    keyword: fupdate
    snippet: sudo flatpak update && sudo flatpak remove --unused

  - name: mise update
    keyword: mupdate
    snippet: mise self-update --quiet; mise upgrade --bump; mise cache prune

  - name: pacman update
    keyword: pupdate
    snippet: sudo pacman -Syu

  - name: snap update
    keyword: supdate
    snippet: sudo snap refresh

  - name: yay update
    keyword: yupdate
    snippet: yay -Syu

  - name: zypper update
    keyword: zupdate
    snippet: sudo zypper ref && sudo zypper update -y

  # snippet and keyword abbrev
  - name: git status
    keyword: gs
    snippet: git status --short --branch

  # snippet with placeholder
  - name: git commit message
    keyword: gcim
    snippet: git commit -m '{{commit_message}}'

  - name: "null"
    keyword: "null"
    snippet: ">/dev/null 2>&1"
    # auto expand condition
    # If not defined, it is only valid at the beginning of a line.
    context:
      # buffer: ''
      lbuffer: '.+\s'
      # rbuffer: ''

  - name: branch
    keyword: B
    snippet: git symbolic-ref --short HEAD
    context:
      lbuffer: '^git\s+checkout\s+'
    evaluate: true # eval snippet

completions:
  # simple sourceCommand, no callback
  - name: kill signal
    patterns:
      - "^kill -s $"
    sourceCommand: "kill -l | tr ' ' '\\n'"
    options:
      --prompt: "'Kill Signal> '"

  # use excludePatterns and callback
  - name: kill pid
    patterns:
      - "^kill( .*)? $"
    excludePatterns:
      # -l, -n or -s is followed by SIGNAL instead of PID
      - " -[lns] $"
    sourceCommand: "LANG=C ps -ef | sed 1d"
    options:
      --multi: true
      --prompt: "'Kill Process> '"
    callback: "awk '{print $2}'"

  # Use null (\0) termination Input / Output
  - name: chdir
    patterns:
      - "^cd $"
    sourceCommand: "find . -path '*/.git' -prune -o -maxdepth 5 -type d -print0"
    options:
      # Added --read0 if null termination is used in `sourceCommand` output.
      --read0: true
      --prompt: "'Chdir> '"
      --preview: "cd {} && ls -a | sed '/^[.]*$/d'"
    callback: "cut -z -c 3-"
    callbackZero: true # null termination is used in `callback` I/O
