fzf = { scoop = "fzf", apt = "fzf", aur = "fzf", nix = "fzf" }
gh = { scoop = "gh", aur = "github-cli", nix = "gh" }
git = { scoop = "git", apt = "git", aur = "git" }
glab = { scoop = "glab", aur = "glab", nix = "glab" }
