[dependencies]
uv = [
  "black",
  "cmake-language-server",
  "flake8",
  "ignr",
  "isort",
  "mypy",
  "pyright",
  "ruff"
]
rustup = [
  "clippy",
  "rust-analysis",
  "rust-src",
  "rust-docs",
  "rustfmt",
  "rust-analyzer",
]

